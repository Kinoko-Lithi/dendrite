<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Dendrite Creative Studio — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">
<style>
  /* HERO INTRO ABOVE SERVICES */
  .hero-intro {
    text-align: center;
    padding-top: 120px;       /* space from top */
    margin-bottom: 80px;      /* smaller distance to services */
  }

  .hero-intro h1 {
    font-size: 72px;
    font-weight: 800;
    margin-bottom: 20px;
  }

  .hero-intro h2 {
    font-size: 28px;
    font-weight: 500;
    color: #333;
    opacity: 0;
    transform: translateY(20px);
    animation: slideFadeIn 1s forwards 0.5s; /* animate in 0.5s delay */
  }

  /* Animation keyframes */
  @keyframes slideFadeIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* SERVICES TEXT - pushed down for scrolling */
  .services-text {
    text-align: center;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.6;
    color: #000;
    margin-top: 60vh; /* scroll distance */
  }

  .services-text p {
    margin-bottom: 25px;
  }
</style>
</head>
<body class="home-page">

<!-- VIDEO BACKGROUND -->
<video class="background-video" autoplay muted loop playsinline preload="auto">
  <source src="./image/background.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="nav-container">
    <div class="logo-wrap">
      <a href="./index.html">
        <img src="./image/logo.png" alt="Dendrite Creative Studio Logo">
      </a>
      <span class="logo-text">DENDRITE CREATIVE STUDIO</span>
    </div>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <div class="dropdown">
        <span class="nav-label">Works</span>
        <div class="dropdown-content">
          <a href="./videos.html">Videos</a>
          <a href="./images.html">Images</a>
        </div>
      </div>
      <a href="./about.html">About</a>
      <a href="./contact.html">Contact</a>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="page-content">

  <!-- HERO INTRO -->
  <div class="hero-intro">
    <h1>Dendrite</h1>
    <h2>Creative Ideas in Motion</h2>
  </div>

  <!-- HERO SERVICES SECTION -->
  <section class="hero-section">
    <div class="services-text" id="services-text">
      <p>Graphic Design</p>
      <p>Music & Sound Design</p>
      <p>Video Art | Motion Graphics</p>
      <p>Live Stage Visuals</p>
      <p>Web Design | Web Development</p>
    </div>
  </section>

</main>

<!-- FOOTER -->
<footer>
  © 2026 Dendrite Creative Studio
</footer>

<!-- JAVASCRIPT -->
<script src="./main.js"></script>

</body>
</html>
