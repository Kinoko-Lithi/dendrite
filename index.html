<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Dendrite Creative Studio — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">
<style>
/* HERO INTRO */
.hero-intro {
  text-align: center;
  padding-top: 180px; /* Push DENDRITE down from top */
  margin-bottom: 20px;
}

.hero-intro h1, .hero-intro h2 {
  display: block;
  font-weight: 800;
  text-align: center;
}

.hero-intro h1 {
  font-size: 72px;
  margin-bottom: 20px;
}

.hero-intro h2 {
  font-size: 28px;
  font-weight: 500;
  color: #333;
  margin-top: 0;
}

/* Animate letters */
.hero-intro span {
  opacity: 0;
  transform: translateY(20px);
  display: inline-block;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* DOWN ARROW */
.down-arrow {
  font-size: 48px;
  color: #333;
  margin: 40px auto 0;
  text-align: center;
  display: block;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-15px); }
  60% { transform: translateY(-7px); }
}

/* SERVICES TEXT */
.services-text {
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.5;
  color: #000;
  margin-top: 60vh;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.services-text.visible {
  opacity: 1;
  transform: translateY(0);
}

.services-text p {
  margin-bottom: 20px;
}
</style>
</head>
<body class="home-page">

<!-- VIDEO BACKGROUND -->
<video class="background-video" autoplay muted loop playsinline preload="auto">
  <source src="./image/background.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="nav-container">
    <div class="logo-wrap">
      <a href="./index.html"><img src="./image/logo.png" alt="Dendrite Creative Studio Logo"></a>
      <span class="logo-text">DENDRITE CREATIVE STUDIO</span>
    </div>
    <div class="nav-links">
      <a href="./index.html">Home</a>
      <div class="dropdown">
        <span class="nav-label">Works</span>
        <div class="dropdown-content">
          <a href="./videos.html">Videos</a>
          <a href="./images.html">Images</a>
        </div>
      </div>
      <a href="./about.html">About</a>
      <a href="./contact.html">Contact</a>
    </div>
  </div>
</nav>

<!-- HERO INTRO -->
<div class="hero-intro">
  <h1 id="dendrite-text">DENDRITE</h1>
  <h2 id="slogan-text">Creative Ideas in Motion</h2>
  <span class="down-arrow">&#x2193;</span> <!-- Down arrow -->
</div>

<!-- SERVICES SECTION -->
<section class="hero-section">
  <div class="services-text" id="services-text">
    <h1>What we can do for you</h1>
    <p>Graphic Design</p>
    <p>Music & Sound Design</p>
    <p>Video Art | Motion Graphics</p>
    <p>Live Stage Visuals</p>
    <p>Web Design | Web Development</p>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 Dendrite Creative Studio
</footer>

<!-- JAVASCRIPT -->
<script>
// Animate hero text letters
window.addEventListener("DOMContentLoaded", function() {
  function animateText(id) {
    const container = document.getElementById(id);
    if (!container) return;

    const text = container.textContent;
    container.textContent = "";

    text.split("").forEach((char, index) => {
      const span = document.createElement("span");
      span.textContent = char === " " ? "\u00A0" : char;
      span.style.opacity = "0";
      span.style.transform = "translateY(20px)";
      container.appendChild(span);

      setTimeout(() => {
        span.style.opacity = "1";
        span.style.transform = "translateY(0)";
      }, index * 80); // slower animation
    });
  }

  animateText("dendrite-text");
  animateText("slogan-text");
});

// Scroll-triggered services animation
const services = document.getElementById("services-text");
function revealServices() {
  const triggerBottom = window.innerHeight * 0.85;
  const serviceTop = services.getBoundingClientRect().top;
  if(serviceTop < triggerBottom) {
    services.classList.add("visible");
  }
}
window.addEventListener("scroll", revealServices);
revealServices(); // in case already in view
</script>

</body>
</html>
