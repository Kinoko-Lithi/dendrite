<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Dendrite Creative Studio — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">

<style>

/* HERO INTRO */

.hero-intro{
  text-align:center;
  padding-top:120px;
  margin-bottom:80px;
}

.hero-intro h1,
.hero-intro h2{
  font-weight:800;
  display:block;
  text-align:center;
}

.hero-intro h1{
  font-size:72px;
  margin-bottom:20px;
}

.hero-intro h2{
  font-size:28px;
  font-weight:500;
  color:#333;
  margin-top:0;
}

/* animation spans */

.hero-intro span{
  opacity:0;
  transform:translateY(20px);
  display:inline-block;
  transition:opacity .5s ease, transform .5s ease;
}


/* SERVICES SECTION */

.services-text{
  text-align:center;
  font-size:32px;
  font-weight:600;
  line-height:1.6;
  color:#000;

  margin-top:60vh;     /* pushes services down */
  margin-bottom:300px; /* space below services */

  opacity:0;
  transform:translateY(60px);
  transition:opacity .8s ease, transform .8s ease;
}

/* visible state */

.services-text.visible{
  opacity:1;
  transform:translateY(0);
}

.services-text h1{
  font-size:36px;
  margin-bottom:40px;
}

.services-text p{
  margin-bottom:25px;
}

</style>

</head>

<body class="home-page">

<!-- VIDEO BACKGROUND -->

<video class="background-video" autoplay muted loop playsinline preload="auto">
<source src="./image/background.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>

<!-- NAVIGATION -->

<nav class="nav">

<div class="nav-container">

<div class="logo-wrap">
<a href="./index.html">
<img src="./image/logo.png" alt="Dendrite Creative Studio Logo">
</a>
<span class="logo-text">DENDRITE CREATIVE STUDIO</span>
</div>

<div class="nav-links">

<a href="./index.html">Home</a>

<div class="dropdown">
<span class="nav-label">Works</span>

<div class="dropdown-content">
<a href="./videos.html">Videos</a>
<a href="./images.html">Images</a>
</div>

</div>

<a href="./about.html">About</a>
<a href="./contact.html">Contact</a>

</div>

</div>

</nav>


<!-- MAIN CONTENT -->

<main class="page-content">

<!-- HERO INTRO -->

<div class="hero-intro">

<h1 id="dendrite-text">DENDRITE</h1>
<h2 id="slogan-text">Creative Ideas in Motion</h2>

</div>


<!-- SERVICES -->

<section class="hero-section">

<div class="services-text" id="services-text">

<h1>What we can do for you</h1>

<p>Graphic Design</p>
<p>Music & Sound Design</p>
<p>Video Art | Motion Graphics</p>
<p>Live Stage Visuals</p>
<p>Web Design | Web Development</p>

</div>

</section>

</main>


<!-- FOOTER -->

<footer>
© 2026 Dendrite Creative Studio
</footer>


<!-- JAVASCRIPT -->

<script>

/* ======================
   HERO TEXT ANIMATION
====================== */

window.addEventListener("DOMContentLoaded",function(){

function animateText(id){

const container=document.getElementById(id);
if(!container)return;

const text=container.textContent;
container.textContent="";

text.split("").forEach(function(char,index){

const span=document.createElement("span");

span.textContent=char===" "?"\u00A0":char;
span.style.opacity="0";
span.style.transform="translateY(20px)";

container.appendChild(span);

setTimeout(function(){

span.style.opacity="1";
span.style.transform="translateY(0)";

},index*50);

});

}

animateText("dendrite-text");
animateText("slogan-text");

});


/* ======================
   SERVICES SCROLL REVEAL
====================== */

const services=document.querySelector("#services-text");

function revealServices(){

const rect=services.getBoundingClientRect();

if(rect.top<window.innerHeight*0.85){

services.classList.add("visible");

}

}

window.addEventListener("scroll",revealServices);

revealServices();

</script>

</body>
