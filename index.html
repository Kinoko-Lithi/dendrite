<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Dendrite Creative Studio — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">
<style>
/* HERO INTRO ABOVE SERVICES */
.hero-intro {
  text-align: center;
  padding-top: 150px; /* space from top for centering */
  margin-bottom: 60px;
  position: relative;
  z-index: 1;
}

.hero-intro h1,
.hero-intro h2 {
  display: block;
  font-weight: 800;
  text-align: center;
}

.hero-intro h1 {
  font-size: 72px;
  margin-bottom: 20px;
}

.hero-intro h2 {
  font-size: 28px;
  font-weight: 500;
  color: #333;
  margin-top: 0;
}

.hero-intro span {
  opacity: 0;
  transform: translateY(20px);
  display: inline-block;
  transition: opacity 0.7s ease, transform 0.7s ease;
}

/* Arrow between hero and services */
.hero-arrow {
  text-align: center;
  font-size: 32px;
  color: #333;
  margin-top: 30px;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(15px); }
}

/* SERVICES SECTION */
.home-page .services-text {
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.6;
  color: #000;
  margin-top: 60vh; /* scroll down */
  margin-bottom: 200px; /* spacing from footer */
}

.home-page .services-text p {
  margin-bottom: 20px;
}

.home-page .services-text span {
  opacity: 0;
  transform: translateY(20px);
  display: inline-block;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

/* NAV DROPDOWN FIX */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: rgba(255,255,255,0.95);
  border-bottom: 1px solid #eee;
  z-index: 9999; /* higher than hero */
}

.dropdown {
  position: relative;
  z-index: 9999;
}

.dropdown-content {
  top: 100%; /* always below nav item */
  left: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  display: flex;
  flex-direction: column;
  background: #fff;
  border: 1px solid #eee;
  min-width: 140px;
}

.dropdown-content a {
  padding: 8px 15px;
  text-decoration: none;
  color: #000;
}

.dropdown-content a:hover {
  background: #f5f5f5;
}

/* Show dropdown when nav-label clicked (mobile) */
.dropdown.active .dropdown-content {
  max-height: 500px;
}

/* VIDEO BACKGROUND */
.background-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;
  pointer-events: none;
}

/* RESPONSIVE: MOBILE DROPDOWN CLICK */
@media (max-width: 768px) {
  .nav-links {
    flex-direction: column;
    background: rgba(255,255,255,0.95);
    position: fixed;
    top: 70px;
    left: 0;
    width: 100%;
    display: none;
  }
  .nav-links.show {
    display: flex;
  }
}
</style>
</head>
<body class="home-page">

<!-- VIDEO BACKGROUND -->
<video class="background-video" autoplay muted loop playsinline preload="auto">
  <source src="./image/background.mp4" type="video/mp4">
</video>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="nav-container">
    <div class="logo-wrap">
      <a href="./index.html"><img src="./image/logo.png" alt="Dendrite Creative Studio Logo"></a>
      <span class="logo-text">DENDRITE CREATIVE STUDIO</span>
    </div>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <div class="dropdown" id="worksDropdown">
        <span class="nav-label">Works</span>
        <div class="dropdown-content">
          <a href="./videos.html">Videos</a>
          <a href="./images.html">Images</a>
        </div>
      </div>
      <a href="./about.html">About</a>
      <a href="./contact.html">Contact</a>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="page-content">
  <!-- HERO INTRO -->
  <div class="hero-intro">
    <h1 id="dendrite-text">DENDRITE</h1>
    <h2 id="slogan-text">Creative Ideas in Motion</h2>
    <div class="hero-arrow">&#8595;</div>
  </div>

  <!-- HERO SERVICES SECTION -->
  <section class="hero-section">
    <div class="services-text" id="services-text">
      <p>Graphic Design</p>
      <p>Music & Sound Design</p>
      <p>Video Art | Motion Graphics</p>
      <p>Live Stage Visuals</p>
      <p>Web Design | Web Development</p>
    </div>
  </section>
</main>

<!-- FOOTER -->
<footer>
  © 2026 Dendrite Creative Studio
</footer>

<!-- JAVASCRIPT -->
<script>
// Animate hero text on load
window.addEventListener("DOMContentLoaded", function() {
  function animateText(id) {
    const container = document.getElementById(id);
    if (!container) return;
    const text = container.textContent;
    container.textContent = "";
    text.split("").forEach((char, index) => {
      const span = document.createElement("span");
      span.textContent = char === " " ? "\u00A0" : char;
      container.appendChild(span);
      setTimeout(() => {
        span.style.opacity = "1";
        span.style.transform = "translateY(0)";
      }, index * 80); // slower animation
    });
  }
  animateText("dendrite-text");
  animateText("slogan-text");
});

// Animate services on scroll
const services = document.getElementById("services-text");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const spans = services.querySelectorAll("p");
      spans.forEach((p, idx) => {
        const chars = p.textContent.split("");
        p.textContent = "";
        chars.forEach((c, i) => {
          const span = document.createElement("span");
          span.textContent = c === " " ? "\u00A0" : c;
          span.style.opacity = 0;
          span.style.transform = "translateY(20px)";
          span.style.display = "inline-block";
          span.style.transition = "opacity 0.6s ease, transform 0.6s ease";
          p.appendChild(span);
          setTimeout(() => {
            span.style.opacity = 1;
            span.style.transform = "translateY(0)";
          }, i*30 + idx*200);
        });
      });
    }
  });
},{threshold:0.3});
observer.observe(services);

// Dropdown toggle for mobile / click
const worksDropdown = document.getElementById("worksDropdown");
worksDropdown.querySelector(".nav-label").addEventListener("click", () => {
  worksDropdown.classList.toggle("active");
});
</script>

</body>
</html>
