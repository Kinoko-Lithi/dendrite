<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Dendrite Creative Studio — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">

<style>

/* FULLSCREEN HERO */

.hero-intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
  position:relative;
}

/* HERO TEXT */

.hero-intro h1{
  font-size:96px;
  font-weight:900;
  letter-spacing:4px;
  margin-bottom:20px;
}

.hero-intro h2{
  font-size:28px;
  font-weight:500;
  color:#333;
}

/* LETTER ANIMATION */

.hero-intro span{
  opacity:0;
  transform:translateY(30px);
  display:inline-block;
  transition:opacity 1s ease, transform 1s ease;
}

/* SCROLL ARROW */

.scroll-arrow{
  position:absolute;
  bottom:40px;
  font-size:36px;
  color:#333;
  cursor:pointer;
  animation: bounce 1.6s infinite;
}

@keyframes bounce{
  0%,20%,50%,80%,100%{transform:translateY(0);}
  40%{transform:translateY(-15px);}
  60%{transform:translateY(-7px);}
}

/* SERVICES SECTION */

.hero-section{
  padding-top:120px;
  padding-bottom:350px;
}

.services-text{
  text-align:center;
  font-size:32px;
  font-weight:600;
  line-height:1.7;
  opacity:0;
  transform:translateY(100px);
  transition:opacity 1.6s ease, transform 1.6s ease;
}

.services-text.visible{
  opacity:1;
  transform:translateY(0);
}

.services-text h1{
  font-size:38px;
  margin-bottom:40px;
}

.services-text p{
  margin-bottom:25px;
}

</style>
</head>

<body class="home-page">

<!-- VIDEO BACKGROUND -->

<video class="background-video" autoplay muted loop playsinline preload="auto">
<source src="./image/background.mp4" type="video/mp4">
</video>

<!-- NAVIGATION -->

<nav class="nav">

<div class="nav-container">

<div class="logo-wrap">
<a href="./index.html">
<img src="./image/logo.png" alt="Dendrite Creative Studio Logo">
</a>
<span class="logo-text">DENDRITE CREATIVE STUDIO</span>
</div>

<div class="nav-links">

<a href="./index.html">Home</a>

<div class="dropdown">
<span class="nav-label">Works</span>

<div class="dropdown-content">
<a href="./videos.html">Videos</a>
<a href="./images.html">Images</a>
</div>

</div>

<a href="./about.html">About</a>
<a href="./contact.html">Contact</a>

</div>

</div>

</nav>

<!-- MAIN CONTENT -->

<main class="page-content">

<!-- HERO -->

<section class="hero-intro">

<h1 id="dendrite-text">DENDRITE</h1>
<h2 id="slogan-text">Creative Ideas in Motion</h2>

<!-- Scroll Arrow -->
<div class="scroll-arrow" id="scroll-arrow">&#8595;</div>

</section>

<!-- SERVICES -->

<section class="hero-section">

<div class="services-text" id="services-text">

<h1>What we can do for you</h1>

<p>Graphic Design</p>
<p>Music & Sound Design</p>
<p>Video Art | Motion Graphics</p>
<p>Live Stage Visuals</p>
<p>Web Design | Web Development</p>

</div>

</section>

</main>

<footer>
© 2026 Dendrite Creative Studio
</footer>

<script src="./main.js"></script>

<script>

/* HERO TEXT ANIMATION */

function animateText(id){
  const container=document.getElementById(id);
  if(!container) return;
  const text=container.textContent;
  container.textContent="";
  text.split("").forEach(function(char,index){
    const span=document.createElement("span");
    span.textContent=char===" " ? "\u00A0" : char;
    container.appendChild(span);
    setTimeout(function(){
      span.style.opacity="1";
      span.style.transform="translateY(0)";
    },index*120);
  });
}

window.addEventListener("load",function(){
  animateText("dendrite-text");
  animateText("slogan-text");
});

/* SERVICES SCROLL REVEAL */

const services=document.querySelector("#services-text");
function revealServices(){
  const rect=services.getBoundingClientRect();
  if(rect.top < window.innerHeight*0.85){
    services.classList.add("visible");
  }
}
window.addEventListener("scroll",revealServices);
revealServices();

/* WORKS DROPDOWN */

const dropdown=document.querySelector(".dropdown");
if(dropdown){
  dropdown.addEventListener("click",function(e){
    e.stopPropagation();
    dropdown.classList.toggle("active");
  });
  document.addEventListener("click",function(){
    dropdown.classList.remove("active");
  });
}

/* SCROLL ARROW FUNCTIONALITY */

const scrollArrow=document.getElementById("scroll-arrow");
if(scrollArrow){
  scrollArrow.addEventListener("click",function(){
    const offset=services.offsetTop;
    window.scrollTo({
      top:offset-50,
      behavior:"smooth"
    });
  });
}

</script>

</body>
</html>
